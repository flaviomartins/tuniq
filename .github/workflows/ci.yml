name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.24.x', 'stable']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: go fmt
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))" != "" ]; then
            echo "Go files are not formatted"
            gofmt -l $(find . -name '*.go' -not -path './.git/*')
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...
